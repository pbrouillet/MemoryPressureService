name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.0). Leave empty for manual builds."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Determine version tag
        id: version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}"
          } elseif ("${{ inputs.tag }}" -ne "") {
            $v = "${{ inputs.tag }}"
          } else {
            $v = "v" + (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          }
          Write-Output "tag=$v" >> $env:GITHUB_OUTPUT
          Write-Output "Resolved version: $v"

      - name: Rename binary
        run: Copy-Item "target/release/mpa.exe" "mpa-${{ steps.version.outputs.tag }}.exe"

      - name: Create GitHub Release
        if: steps.version.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MPA ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: mpa-${{ steps.version.outputs.tag }}.exe
